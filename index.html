<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder24hz</title>
    <style>
        :root {
            --bg-gif: url('https://i.pinimg.com/originals/10/ff/4f/10ff4f98a494e390e07b1a0e9eefa4be.gif');
            --card-bg: rgba(15, 15, 15, 0.4); 
            --text-main: #FFFFFF;
            --neon-glow: #ffffff; /* Цвет свечения полосы */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-gif) center/cover no-repeat fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Точка за курсором */
        #cursor-trail {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff;
            transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            padding-bottom: 60px;
        }

        .profile {
            margin-bottom: 60px; 
        }

        .profile h1 {
            font-size: 38px;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: #fff;
            animation: glow 4s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 4px rgba(255,255,255,0.6), 0 0 8px rgba(255,255,255,0.4); }
            50% { text-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 25px rgba(255,255,255,0.7); }
            100% { text-shadow: 0 0 8px rgba(255,255,255,0.7), 0 0 12px rgba(255,255,255,0.5); }
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Контейнер кнопки */
        .link-wrapper {
            position: relative;
            width: 100%;
            height: 60px; 
            display: block;
            text-decoration: none;
        }

        /* Адаптивный SVG слой с мощным неоновым свечением */
        .border-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Мощный неоновый фильтр для всей линии */
            filter: drop-shadow(0 0 4px var(--neon-glow)) drop-shadow(0 0 12px var(--neon-glow));
        }

        .border-rect {
            x: 1px;
            y: 1px;
            width: calc(100% - 2px);
            height: calc(100% - 2px);
            fill: none;
            stroke: #ffffff;
            stroke-width: 2px;
            /* stroke-dasharray выставлен так, чтобы на экране была строго одна линия */
            stroke-dasharray: 120 1000; 
            animation: run-border 3s linear infinite;
        }

        @keyframes run-border {
            from {
                stroke-dashoffset: 0;
            }
            to {
                stroke-dashoffset: -1020; /* Полный круг прохода одной линии */
            }
        }

        /* Сама квадратная прозрачная кнопка */
        .link-card {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1); /* Легкий контур, пока линия не добежала */
            color: var(--text-main);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(8px);
        }

        /* Эффект наведения */
        .link-wrapper:hover .link-card {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .link-wrapper:hover .border-rect {
            animation: run-border 1.2s linear infinite; /* Ускорение при наведении */
            stroke-dasharray: 200 1000; /* Линия становится чуть длиннее при ховере */
        }
    </style>
</head>
<body>

    <div id="cursor-trail"></div>

    <div class="container">
        
        <div class="profile">
            <h1>Oder24hz</h1>
        </div>

        <div class="links-group">
            <a href="https://t.me" target="_blank" class="link-wrapper">
                <svg class="border-svg"><rect class="border-rect"></rect></svg>
                <div class="link-card">Telegram Channel</div>
            </a>
            
            <a href="https://t.me" target="_blank" class="link-wrapper">
                <svg class="border-svg"><rect class="border-rect"></rect></svg>
                <div class="link-card">Telegram RealLife</div>
            </a>
            
            <a href="https://twitch.tv" target="_blank" class="link-wrapper">
                <svg class="border-svg"><rect class="border-rect"></rect></svg>
                <div class="link-card">Twitch</div>
            </a>
            
            <a href="https://youtube.com" target="_blank" class="link-wrapper">
                <svg class="border-svg"><rect class="border-rect"></rect></svg>
                <div class="link-card">Youtube</div>
            </a>
            
            <a href="https://discord.gg" target="_blank" class="link-wrapper">
                <svg class="border-svg"><rect class="border-rect"></rect></svg>
                <div class="link-card">Discord</div>
            </a>
            
            <a href="https://t.me" target="_blank" class="link-wrapper">
                <svg class="border-svg"><rect class="border-rect"></rect></svg>
                <div class="link-card">Reviews</div>
            </a>
            
            <a href="https://t.me" target="_blank" class="link-wrapper">
                <svg class="border-svg"><rect class="border-rect"></rect></svg>
                <div class="link-card">Contact Account</div>
            </a>
        </div>

    </div>

    <script>
        const trail = document.getElementById('cursor-trail');
        window.addEventListener('mousemove', (e) => {
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
