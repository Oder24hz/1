<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder24hz</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gif: url('https://i.pinimg.com/originals/31/f0/cb/31f0cbbfe52091e54b2f8157ebd60a8f.gif');
            --text-main: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Полностью скрываем дефолтную мышь */
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-gif) center/cover no-repeat fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Элементы аккуратного шлейфа */
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px #ffffff;
            will-change: transform;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .profile {
            margin-bottom: 60px; 
        }

        /* Текст переливается точно так же, как и кнопки */
        .profile h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 62px;
            letter-spacing: -3px;
            text-transform: uppercase;
            
            /* Перелив как на кнопках */
            color: transparent;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(120, 120, 120, 0.4) 50%, 
                rgba(255, 255, 255, 0.9) 100%
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            
            animation: wave-shift 6s ease infinite;
            filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.8));
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            perspective: 1000px;
        }

        .link-card {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center; 
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            
            background: linear-gradient(135deg, 
                rgba(20, 20, 20, 0.5) 0%, 
                rgba(45, 45, 45, 0.4) 50%, 
                rgba(20, 20, 20, 0.5) 100%
            );
            background-size: 200% 200%;
            animation: wave-shift 6s ease infinite;
            backdrop-filter: blur(8px);
            
            transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Общая анимация перелива для текста и кнопок */
        @keyframes wave-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .link-card:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
        }
    </style>
</head>
<body>

    <!-- Контейнер для точек аккуратного шлейфа -->
    <div id="trail-container"></div>

    <div class="container">
        
        <div class="profile">
            <h1>Oder24hz</h1>
        </div>

        <div class="links-group">
            <a href="https://t.me" target="_blank" class="link-card">Telegram Channel</a>
            <a href="https://t.me" target="_blank" class="link-card">Telegram RealLife</a>
            <a href="https://twitch.tv" target="_blank" class="link-card">Twitch</a>
            <a href="https://youtube.com" target="_blank" class="link-card">Youtube</a>
            <a href="https://discord.gg" target="_blank" class="link-card">Discord</a>
            <a href="https://t.me" target="_blank" class="link-card">Reviews</a>
            <a href="https://t.me" target="_blank" class="link-card">Contact Account</a>
        </div>

    </div>

    <script>
        // Скрипт плавного аккуратного шлейфа (мышь + хвост из 5 точек)
        const dotsCount = 5;
        const container = document.getElementById('trail-container');
        const dots = [];
        
        let mouse = { x: 0, y: 0 };
        
        // Создаем точки шлейфа с уменьшением размера и прозрачности к концу хвоста
        for (let i = 0; i < dotsCount; i++) {
            const dot = document.createElement('div');
            dot.className = 'cursor-dot';
            dot.style.opacity = (1 - (i / dotsCount)).toFixed(2);
            dot.style.transform = `translate(-50%, -50%) scale(${(1 - (i / dotsCount) * 0.5).toFixed(2)})`;
            container.appendChild(dot);
            dots.push({ element: dot, x: 0, y: 0 });
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Функция плавной интерполяции хвоста
        function animateDots() {
            let targetX = mouse.x;
            let targetY = mouse.y;

            dots.forEach((dot, index) => {
                // Каждая следующая точка стремится к предыдущей с задержкой
                dot.x += (targetX - dot.x) * 0.35;
                dot.y += (targetY - dot.y) * 0.35;
                
                dot.element.style.left = dot.x + 'px';
                dot.element.style.top = dot.y + 'px';
                
                targetX = dot.x;
                targetY = dot.y;
            });

            requestAnimationFrame(animateDots);
        }
        animateDots();

        // Физика желе для кнопок при уходе курсора
        const cards = document.querySelectorAll('.link-card');
        cards.forEach(card => {
            card.addEventListener('mouseleave', () => {
                const rect = card.getBoundingClientRect();
                const cardCenterX = rect.left + rect.width / 2;
                const cardCenterY = rect.top + rect.height / 2;
                
                const deltaX = mouse.x - cardCenterX;
                const deltaY = mouse.y - cardCenterY;
                
                const tiltX = (deltaY / rect.height) * 12;
                const tiltY = -(deltaX / rect.width) * 12;
                
                card.style.transition = 'transform 0.1s ease-out';
                card.style.transform = `scale(0.96) skew(${tiltY * 0.2}deg) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                
                setTimeout(() => {
                    card.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.2, 1.4)';
                    card.style.transform = 'scale(1) skew(0deg) rotateX(0deg) rotateY(0deg)';
                }, 100);
            });
        });
    </script>
</body>
</html>
