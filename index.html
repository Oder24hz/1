<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder24hz</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gif: url('https://giphy.com');
            --text-main: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none !important; /* Намертво прячем стандартную мышь */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; /* Запрет на выделение текста */
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-gif) center/cover no-repeat fixed;
        }

        body {
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ПОЛНЫЙ ЖЕСТКИЙ ФИКС ВИДИМОСТИ КУРСОРA */
        #trail-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999999 !important; /* Курсор выше абсолютно всего на странице */
            isolation: isolate; /* Защита от багов с backdrop-filter */
        }

        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background-color: #ffffff !important;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff;
            will-change: left, top;
            transform: translate(-50%, -50%);
            z-index: 99999999 !important;
            mix-blend-mode: difference; /* Инверсия цвета, чтобы его было видно на любых фонах */
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .profile {
            margin-bottom: 60px; 
            display: inline-block;
            width: 100%;
        }

        .profile h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 62px;
            letter-spacing: -3px;
            text-transform: uppercase;
            display: inline-block;
            
            color: transparent;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(120, 120, 120, 0.4) 50%, 
                rgba(255, 255, 255, 0.9) 100%
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            
            animation: wave-shift 6s ease infinite;
            filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.8));
            
            will-change: transform;
            transform-origin: center center;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            perspective: 1000px;
        }

        .link-card {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center; 
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            
            background: linear-gradient(135deg, 
                rgba(20, 20, 20, 0.5) 0%, 
                rgba(45, 45, 45, 0.4) 50%, 
                rgba(20, 20, 20, 0.5) 100%
            );
            background-size: 200% 200%;
            animation: wave-shift 6s ease infinite;
            backdrop-filter: blur(8px);
            
            transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            will-change: transform;
        }

        @keyframes wave-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .link-card:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
        }
    </style>
</head>
<body>

    <!-- Слой кастомного шлейфа -->
    <div id="trail-container"></div>

    <div class="container">
        
        <div class="profile">
            <h1 id="drag-title">Oder24hz</h1>
        </div>

        <div class="links-group">
            <a href="https://t.me" target="_blank" class="link-card">Telegram Channel</a>
            <a href="https://t.me" target="_blank" class="link-card">Telegram RealLife</a>
            <a href="https://twitch.tv" target="_blank" class="link-card">Twitch</a>
            <a href="https://youtube.com" target="_blank" class="link-card">Youtube</a>
            <a href="https://discord.gg" target="_blank" class="link-card">Discord</a>
            <a href="https://t.me" target="_blank" class="link-card">Reviews</a>
            <a href="https://t.me" target="_blank" class="link-card">Contact Account</a>
        </div>

    </div>

    <script>
        // 1. АНИМАЦИЯ НАЗВАНИЯ ВКЛАДКИ
        const titles = ["мне", "нужен", "психолог"];
        let titleIndex = 0;
        setInterval(() => {
            titleIndex = (titleIndex + 1) % titles.length;
            document.title = titles[titleIndex];
        }, 3000);

        // 2. ИСПРАВЛЕННЫЙ ШЛЕЙФ КУРСОРA
        const dotsCount = 5;
        const container = document.getElementById('trail-container');
        const dots = [];
        
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        
        for (let i = 0; i < dotsCount; i++) {
            const dot = document.createElement('div');
            dot.className = 'cursor-dot';
            container.appendChild(dot);
            dots.push({ element: dot, x: mouse.x, y: mouse.y });
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animateDots() {
            let targetX = mouse.x;
            let targetY = mouse.y;

            dots.forEach((dot, index) => {
                dot.x += (targetX - dot.x) * 0.25;
                dot.y += (targetY - dot.y) * 0.25;
                
                dot.element.style.left = dot.x + 'px';
                dot.element.style.top = dot.y + 'px';
                dot.element.style.opacity = (1 - (index / dotsCount)).toFixed(2);
                dot.element.style.transform = `translate(-50%, -50%) scale(${(1 - (index / dotsCount) * 0.4).toFixed(2)})`;
                
                targetX = dot.x;
                targetY = dot.y;
            });

            requestAnimationFrame(animateDots);
        }
        animateDots();

        // 3. ЖЕЛЕ-ЗАГОЛОВОК (DRAG + SPRING)
        const dragTitle = document.getElementById('drag-title');
        let isDragging = false;
        let startMouseX = 0, startMouseY = 0;
        let currentX = 0, currentY = 0;
        let targetX = 0, targetY = 0;
        let vx = 0, vy = 0;
        
        const spring = 0.12; 
        const friction = 0.82;

        dragTitle.addEventListener('mousedown', (e) => {
            isDragging = true;
            startMouseX = mouse.x - currentX;
            startMouseY = mouse.y - currentY;
            dragTitle.style.transition = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rawX = e.clientX - startMouseX;
            const rawY = e.clientY - startMouseY;
            targetX = rawX * 0.65; 
            targetY = rawY * 0.65;
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            targetX = 0;
            targetY = 0;
        });

        function updatePhysics() {
            if (!isDragging) {
                let ax = (targetX - currentX) * spring;
                let ay = (targetY - currentY) * spring;
                vx += ax;
                vy += ay;
                vx *= friction;
                vy *= friction;
                currentX += vx;
                currentY += vy;
            } else {
                currentX += (targetX - currentX) * 0.3;
                currentY += (targetY - currentY) * 0.3;
            }

            const skewX = isDragging ? (targetX - currentX) * 0.1 : vx * 0.4;
            const rotateY = isDragging ? (targetX - currentX) * 0.05 : vx * 0.2;

            dragTitle.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) skewX(${skewX}deg) rotateY(${rotateY}deg)`;
            
            requestAnimationFrame(updatePhysics);
        }
        updatePhysics();
