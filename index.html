<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder24hz</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gif: url('https://i.pinimg.com/originals/10/ff/4f/10ff4f98a494e390e07b1a0e9eefa4be.gif');
            --text-main: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-gif) center/cover no-repeat fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        #cursor-trail {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff;
            transition: transform 0.06s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .profile {
            margin-bottom: 60px; 
        }

        /* Чистый стеклянный текст без ущербной обводки */
        .profile h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 62px;
            letter-spacing: -3px;
            text-transform: uppercase;
            
            /* Настоящий стеклянный полупрозрачный градиент */
            color: transparent;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.15) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            
            filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.8));
            animation: glass-shimmer 4s ease-in-out infinite alternate;
        }

        @keyframes glass-shimmer {
            0% { filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8)) brightness(0.9); }
            50% { filter: drop-shadow(0 6px 20px rgba(255,255,255,0.1)) brightness(1.1); }
            100% { filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8)) brightness(1.0); }
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            perspective: 1000px;
        }

        .link-card {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center; 
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            
            background: linear-gradient(135deg, 
                rgba(20, 20, 20, 0.5) 0%, 
                rgba(45, 45, 45, 0.4) 50%, 
                rgba(20, 20, 20, 0.5) 100%
            );
            background-size: 200% 200%;
            animation: wave-shift 6s ease infinite;
            backdrop-filter: blur(8px);
            
            transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            will-change: transform;
        }

        @keyframes wave-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .link-card:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
        }
    </style>
</head>
<body>

    <div id="cursor-trail"></div>

    <div class="container">
        
        <div class="profile">
            <h1>Oder24hz</h1>
        </div>

        <div class="links-group">
            <a href="https://t.me" target="_blank" class="link-card">Telegram Channel</a>
            <a href="https://t.me" target="_blank" class="link-card">Telegram RealLife</a>
            <a href="https://twitch.tv" target="_blank" class="link-card">Twitch</a>
            <a href="https://youtube.com" target="_blank" class="link-card">Youtube</a>
            <a href="https://discord.gg" target="_blank" class="link-card">Discord</a>
            <a href="https://t.me" target="_blank" class="link-card">Reviews</a>
            <a href="https://t.me" target="_blank" class="link-card">Contact Account</a>
        </div>

    </div>

    <script>
        const trail = document.getElementById('cursor-trail');
        let mouseX = 0, mouseY = 0;
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            trail.style.left = mouseX + 'px';
            trail.style.top = mouseY + 'px';
        });

        const cards = document.querySelectorAll('.link-card');
        cards.forEach(card => {
            card.addEventListener('mouseleave', (e) => {
                const rect = card.getBoundingClientRect();
                const cardCenterX = rect.left + rect.width / 2;
                const cardCenterY = rect.top + rect.height / 2;
                
                const deltaX = mouseX - cardCenterX;
                const deltaY = mouseY - cardCenterY;
                
                const tiltX = (deltaY / rect.height) * 15;
                const tiltY = -(deltaX / rect.width) * 15;
                
                card.style.transition = 'transform 0.1s ease-out';
                card.style.transform = `scale(0.96) skew(${tiltY * 0.3}deg) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                
                setTimeout(() => {
                    card.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.2, 1.4)';
                    card.style.transform = 'scale(1) skew(0deg) rotateX(0deg) rotateY(0deg)';
                }, 100);
            });
        });
    </script>
</body>
</html>
