<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder24hz</title>
    <!-- Подключаем ультра-жирный футуристичный шрифт для заголовка -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Syne:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gif: url('https://i.pinimg.com/originals/10/ff/4f/10ff4f98a494e390e07b1a0e9eefa4be.gif');
            --text-main: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-gif) center/cover no-repeat fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        #cursor-trail {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff;
            transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .profile {
            margin-bottom: 60px; 
        }

        /* Огромный стеклянный заголовок с новым шрифтом */
        .profile h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 900; /* Максимальная жирность */
            font-size: 54px; /* Увеличенный размер */
            letter-spacing: -2px;
            text-transform: uppercase;
            
            /* Эффект матового стекла на тексте */
            color: rgba(255, 255, 255, 0.85);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3); /* Тонкий стеклянный контур */
            
            /* Плавное покачивание стеклянного блика */
            animation: glass-glow 4s ease-in-out infinite alternate;
        }

        @keyframes glass-glow {
            0% { 
                text-shadow: 
                    0 0 4px rgba(255,255,255,0.2), 
                    0 4px 12px rgba(0,0,0,0.5); 
            }
            50% { 
                text-shadow: 
                    0 0 15px rgba(255,255,255,0.6), 
                    0 0 25px rgba(255,255,255,0.3),
                    0 8px 24px rgba(0,0,0,0.7); 
                color: rgba(255, 255, 255, 0.95);
            }
            100% { 
                text-shadow: 
                    0 0 8px rgba(255,255,255,0.3), 
                    0 4px 16px rgba(0,0,0,0.6); 
            }
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-card {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center; 
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            
            background: linear-gradient(135deg, 
                rgba(20, 20, 20, 0.5) 0%, 
                rgba(45, 45, 45, 0.4) 50%, 
                rgba(20, 20, 20, 0.5) 100%
            );
            background-size: 200% 200%;
            animation: wave-shift 6s ease infinite;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
        }

        @keyframes wave-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .link-card:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div id="cursor-trail"></div>

    <div class="container">
        
        <div class="profile">
            <h1>Oder24hz</h1>
        </div>

        <div class="links-group">
            <a href="https://t.me" target="_blank" class="link-card">Telegram Channel</a>
            <a href="https://t.me" target="_blank" class="link-card">Telegram RealLife</a>
            <a href="https://twitch.tv" target="_blank" class="link-card">Twitch</a>
            <a href="https://youtube.com" target="_blank" class="link-card">Youtube</a>
            <a href="https://discord.gg" class="link-card">Discord</a>
            <a href="https://t.me" target="_blank" class="link-card">Reviews</a>
            <a href="https://t.me" target="_blank" class="link-card">Contact Account</a>
        </div>

    </div>

    <script>
        const trail = document.getElementById('cursor-trail');
        window.addEventListener('mousemove', (e) => {
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
