<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder24hz</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gif: url('https://pinimg.com');
            --text-main: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none !important;
            user-select: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-gif) center/cover no-repeat fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        #trail-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999999;
        }

        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffffff;
            will-change: left, top;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
        }

        .profile h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 62px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #787878 50%, #fff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: wave-shift 6s ease infinite;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 40px;
        }

        .link-card {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center; 
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(20, 20, 20, 0.5);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        @keyframes wave-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .link-card:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.04);
        }
    </style>
</head>
<body>
    <div id="trail-container"></div>
    <div class="container">
        <div class="profile">
            <h1>Oder24hz</h1>
        </div>
        <div class="links-group">
            <a href="https://t.me/OderrrTelegram" target="_blank" class="link-card">Telegram Channel</a>
            <a href="https://t.me/OderRealLife" target="_blank" class="link-card">RealLife Channel</a>
            <a href="https://www.twitch.tv/oder24hz" target="_blank" class="link-card">Twitch</a>
            <a href="https://www.youtube.com/@Oder24hz" target="_blank" class="link-card">Youtube</a>
            <a href="https://discord.gg/pMc7SFH8qX" target="_blank" class="link-card">Discord</a>
            <a href="https://t.me/Oder_optim" target="_blank" class="link-card">Reviews</a>
            <a href="https://t.me/OderOptimization" target="_blank" class="link-card">Contact</a>
        </div>
    </div>

    <script>
        const titles = ["мне", "нужен", "психолог"];
        let titleIndex = 0;
        setInterval(() => {
            titleIndex = (titleIndex + 1) % titles.length;
            document.title = titles[titleIndex];
        }, 3000);

        const dotsCount = 5;
        const container = document.getElementById('trail-container');
        const dots = [];
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        
        for (let i = 0; i < dotsCount; i++) {
            const dot = document.createElement('div');
            dot.className = 'cursor-dot';
            container.appendChild(dot);
            dots.push({ element: dot, x: mouse.x, y: mouse.y });
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animateDots() {
            let targetX = mouse.x;
            let targetY = mouse.y;
            dots.forEach((dot, index) => {
                dot.x += (targetX - dot.x) * 0.25;
                dot.y += (targetY - dot.y) * 0.25;
                dot.element.style.left = dot.x + 'px';
                dot.element.style.top = dot.y + 'px';
                dot.element.style.opacity = (1 - (index / dotsCount));
                targetX = dot.x;
                targetY = dot.y;
            });
            requestAnimationFrame(animateDots);
        }
        animateDots();
    </script>
</body>
</html>
