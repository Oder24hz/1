<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder | Links</title>
    <style>
        :root {
            --bg-color: #0B0B0B;
            --card-bg: #161616;
            --card-border: #222222;
            --card-hover: #2A2A2A;
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .profile {
            margin-bottom: 32px;
        }

        .profile h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .profile p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .link-card:hover {
            background-color: var(--card-hover);
            border-color: #444444;
            transform: translateY(-1px);
        }

        .link-card span:last-child {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 400;
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile">
            <h1>@Oder</h1>
            <p>Optimization & Content Creation</p>
        </div>

        <div class="links-group">
            <a href="https://t.me/Oderrr" target="_blank" class="link-card">
                <span>Telegram Channel</span>
                <span>→</span>
            </a>
            <a href="https://t.me/OderRealLife" target="_blank" class="link-card">
                <span>Telegram RealLife</span>
                <span>→</span>
            </a>
            <a href="https://www.twitch.tv/oder24hz" target="_blank" class="link-card">
                <span>Twitch Stream</span>
                <span>→</span>
            </a>
            <a href="https://www.youtube.com/@Oder24hz" target="_blank" class="link-card">
                <span>YouTube Channel</span>
                <span>→</span>
            </a>
            <a href="https://discord.gg/pMc7SFH8qX" target="_blank" class="link-card">
                <span>Discord Server</span>
                <span>→</span>
            </a>
            <a href="https://t.me/Oder_optim" target="_blank" class="link-card">
                <span>Reviews (Отзывы)</span>
                <span>→</span>
            </a>
            <a href="https://t.me/OderOptimization" target="_blank" class="link-card">
                <span>Contact (Заказ услуг)</span>
                <span>→</span>
            </a>
        </div>

        <div class="footer">
            ODER &copy; 2026
        </div>

    </div>

</body>
</html>
