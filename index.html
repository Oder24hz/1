<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oder24hz</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gif: url('https://i.pinimg.com/originals/31/f0/cb/31f0cbbfe52091e54b2f8157ebd60a8f.gif');
            --text-main: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; /* Блокировка выделения */
        }

        /* Прячем курсор только для устройств, у которых ЕСТЬ мышь */
        @media (pointer: fine) {
            * {
                cursor: none !important;
            }
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-gif) center/cover no-repeat fixed;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Разрешаем вертикальный скролл, если контент не влезает (на мобильных) */
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Выносим кастомный курсор на самый верхний изолированный слой */
        #trail-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999999 !important;
            isolation: isolate;
        }

        /* На телефонах полностью скрываем кастомные точки, чтобы они не залипали */
        @media (pointer: coarse) {
            #trail-container {
                display: none !important;
            }
        }

        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background: #ffffff !important;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999999 !important;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #ffffff, 0 0 25px #ffffff;
            will-change: left, top;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .profile {
            margin-bottom: 60px; 
        }

        /* Текст переливается точно так же, как и кнопки */
        .profile h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 62px;
            letter-spacing: -3px;
            text-transform: uppercase;
            
            color: transparent;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(120, 120, 120, 0.4) 50%, 
                rgba(255, 255, 255, 0.9) 100%
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            
            animation: wave-shift 6s ease infinite;
            filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.8));
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            perspective: 1000px;
        }

        /* Полностью квадратная кнопка с переливом фона */
        .link-card {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center; 
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            
            background: linear-gradient(135deg, 
                rgba(20, 20, 20, 0.5) 0%, 
                rgba(45, 45, 45, 0.4) 50%, 
                rgba(20, 20, 20, 0.5) 100%
            );
            background-size: 200% 200%;
            animation: wave-shift 6s ease infinite;
            backdrop-filter: blur(8px);
            
            transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            will-change: transform;
        }

        @keyframes wave-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Эффект ховера оставляем только для ПК */
        @media (pointer: fine) {
            .link-card:hover {
                background: #ffffff;
                color: #000000;
                border-color: #ffffff;
                box-shadow: 0 0 25px rgba(255, 255, 255, 0.35);
                transform: scale(1.04);
            }
        }

        /* Адаптивность для мобильных телефонов (экраны меньше 480px) */
        @media (max-width: 480px) {
            .profile h1 {
                font-size: 42px; /* Уменьшаем заголовок, чтобы не ломал экран */
                letter-spacing: -1px;
            }
            .profile {
                margin-bottom: 35px; /* Уменьшаем лишние отступы */
            }
            .link-card {
                height: 52px; /* Кнопки чуть компактнее */
                font-size: 14px;
            }
            .links-group {
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="trail-container"></div>

    <div class="container">
        
        <div class="profile">
            <h1>Oder24hz</h1>
        </div>

        <div class="links-group">
            <a href="https://t.me/+PzDDckpGDcFhNjky" target="_blank" class="link-card">Telegram Channel</a>
            <a href="https://t.me/OderRealLife" target="_blank" class="link-card">Telegram RealLife</a>
            <a href="https://www.twitch.tv/oder24hz" target="_blank" class="link-card">Twitch</a>
            <a href="https://www.youtube.com/@Oder24hz" target="_blank" class="link-card">Youtube</a>
            <a href="https://discord.gg/pMc7SFH8qX" target="_blank" class="link-card">Discord</a>
            <a href="https://t.me/Oder_optim" target="_blank" class="link-card">Reviews</a>
            <a href="https://t.me/OderOptimization" target="_blank" class="link-card">Contact Account</a>

    </div>

    <script>
        // 1. АНИМАЦИЯ СМЕНЫ НАЗВАНИЯ ВКЛАДКИ
        const titles = ["мне", "нужен", "психолог"];
        let titleIndex = 0;
        setInterval(() => {
            titleIndex = (titleIndex + 1) % titles.length;
            document.title = titles[titleIndex];
        }, 3000);

        // Проверяем, является ли устройство мобильным (сенсорным)
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // Инициализируем курсор только если это НЕ сенсорный экран
        if (!isTouchDevice) {
            const dotsCount = 5;
            const container = document.getElementById('trail-container');
            const dots = [];
            
            let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            
            for (let i = 0; i < dotsCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'cursor-dot';
                container.appendChild(dot);
                dots.push({ element: dot, x: mouse.x, y: mouse.y });
            }

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            function animateDots() {
                let targetX = mouse.x;
                let targetY = mouse.y;

                dots.forEach((dot, index) => {
                    dot.x += (targetX - dot.x) * 0.25;
                    dot.y += (targetY - dot.y) * 0.25;
                    
                    dot.element.style.left = dot.x + 'px';
                    dot.element.style.top = dot.y + 'px';
                    dot.element.style.opacity = (1 - (index / dotsCount)).toFixed(2);
                    dot.element.style.transform = `translate(-50%, -50%) scale(${(1 - (index / dotsCount) * 0.4).toFixed(2)})`;
                    
                    targetX = dot.x;
                    targetY = dot.y;
                });

                requestAnimationFrame(animateDots);
            }
            animateDots();

            // 3. ЖЕЛЕ ДЛЯ КНОПОК (тоже только для ПК)
            const cards = document.querySelectorAll('.link-card');
            cards.forEach(card => {
                card.addEventListener('mouseleave', () => {
                    const rect = card.getBoundingClientRect();
                    const cardCenterX = rect.left + rect.width / 2;
                    const cardCenterY = rect.top + rect.height / 2;
                    
                    const deltaX = mouse.x - cardCenterX;
                    const deltaY = mouse.y - cardCenterY;
                    
                    // Код анимации желе (если он был ниже) может быть добавлен сюда
                });
            });
        }
    </script>
</body>
</html>
